<pat-more-menu>
    {% assign this_label = item.label | default: 'patterns.label_more_ell' %}
        <a 
            tabindex="0"
            href="{{ include.source }}" 
            data-pat-tooltip="
                source: ajax;
                position-list: tr;"
            class="
                pat-more-menu
                icon 
                more 
                pat-tooltip">{% include patterns/i18n id=this_label %}</a>
</pat-more-menu>
